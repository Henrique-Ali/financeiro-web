<svg viewBox="0 0 512 512" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0B132B" />
      <stop offset="100%" stop-color="#1C2541" />
    </linearGradient>

    <!-- Pillar 1 Gradient (Indigo to Purple) -->
    <linearGradient id="pill1-grad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#4F46E5" />
      <stop offset="100%" stop-color="#9333EA" />
    </linearGradient>

    <!-- Pillar 2 Gradient (Sky to Blue) -->
    <linearGradient id="pill2-grad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#0284C7" />
      <stop offset="100%" stop-color="#3B82F6" />
    </linearGradient>

    <!-- Pillar 3 Gradient (Teal to Emerald) -->
    <linearGradient id="pill3-grad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#0D9488" />
      <stop offset="100%" stop-color="#10B981" />
    </linearGradient>

    <!-- Coin Gradient (Amber to Light Gold) -->
    <linearGradient id="coin-grad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#D97706" />
      <stop offset="50%" stop-color="#FBBF24" />
      <stop offset="100%" stop-color="#FEF08A" />
    </linearGradient>

    <!-- Glass Edge Highlight for Pillars -->
    <linearGradient id="glass-edge" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.7" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.0" />
    </linearGradient>

    <!-- Coin Inner Ring Highlight -->
    <linearGradient id="coin-ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.9" />
      <stop offset="100%" stop-color="#D97706" stop-opacity="0.2" />
    </linearGradient>

    <!-- Drop Shadow Filter -->
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#000000" flood-opacity="0.4" />
    </filter>

    <!-- Glow Filter for Coin -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="24" result="blur" />
    </filter>

    <!-- Ground Shadow Blur -->
    <filter id="ground-blur" x="-20%" y="-50%" width="140%" height="200%">
      <feGaussianBlur stdDeviation="12" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#bg-grad)" />

  <!-- Background Radiating Rings -->
  <g stroke="#ffffff" fill="none">
    <circle cx="328" cy="148" r="100" stroke-width="1" opacity="0.06" />
    <circle cx="328" cy="148" r="160" stroke-width="1" opacity="0.04" />
    <circle cx="328" cy="148" r="220" stroke-width="1" opacity="0.02" />
    <circle cx="328" cy="148" r="280" stroke-width="1" opacity="0.01" />
  </g>

  <!-- Ground Shadow -->
  <ellipse cx="256" cy="436" rx="140" ry="12" fill="#000000" opacity="0.4" filter="url(#ground-blur)" />

  <!-- Pillar 1 (Left) -->
  <g filter="url(#shadow)">
    <rect x="128" y="300" width="64" height="120" rx="32" fill="url(#pill1-grad)" />
    <rect x="129.5" y="301.5" width="61" height="117" rx="30.5" fill="none" stroke="url(#glass-edge)" stroke-width="1.5" opacity="0.8" />
  </g>

  <!-- Pillar 2 (Middle) -->
  <g filter="url(#shadow)">
    <rect x="212" y="220" width="64" height="200" rx="32" fill="url(#pill2-grad)" />
    <rect x="213.5" y="221.5" width="61" height="197" rx="30.5" fill="none" stroke="url(#glass-edge)" stroke-width="1.5" opacity="0.8" />
  </g>

  <!-- Pillar 3 (Right) -->
  <g filter="url(#shadow)">
    <rect x="296" y="180" width="64" height="240" rx="32" fill="url(#pill3-grad)" />
    <rect x="297.5" y="181.5" width="61" height="237" rx="30.5" fill="none" stroke="url(#glass-edge)" stroke-width="1.5" opacity="0.8" />
  </g>

  <!-- Coin Glow -->
  <circle cx="328" cy="148" r="56" fill="#FBBF24" opacity="0.35" filter="url(#glow)" />

  <!-- The Coin -->
  <g filter="url(#shadow)">
    <!-- Coin Base -->
    <circle cx="328" cy="148" r="56" fill="url(#coin-grad)" />
    
    <!-- Coin Outer Edge Highlight -->
    <circle cx="328" cy="148" r="54.5" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.5" />
    
    <!-- Coin Inner Minting Ring -->
    <circle cx="328" cy="148" r="42" fill="none" stroke="url(#coin-ring)" stroke-width="2" opacity="0.9" />
    
    <!-- Minimalist Value Star (Center) -->
    <path d="M 328 120 Q 328 148 300 148 Q 328 148 328 176 Q 328 148 356 148 Q 328 148 328 120 Z" fill="#ffffff" opacity="0.95" />
  </g>
</svg>